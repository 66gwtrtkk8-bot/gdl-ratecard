    html.dark {

    .dark body { background-color: #020617; color: #f8fafc; }
    [data-theme='light'] body { background-color: #f8fafc; color: #0f172a; }
    
    .glass-card { backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    .text-shadow-strong { text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.4); }
    .text-stroke-brand { -webkit-text-stroke: 1.2px #02bf02; paint-order: stroke fill; }

    .print-area { display: none; position: absolute; left: -9999px; top: 0; width: 794px; }

      'check-circle': `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`,
      'file-text': `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`,
      download: `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,

      zap: `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,

      'external-link': `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
      'chevron-down': `<svg xmlns="http://www.w3.org/2000/svg" width="VAR_SIZE" height="VAR_SIZE" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
    };

    const Icon = ({ name, size = 20, className = "" }) => {
      const svg = ICONS[name];
      if (!svg) return null;
      return (
        <span
          className={`inline-flex items-center justify-center align-middle shrink-0 ${className}`}
          dangerouslySetInnerHTML={{ __html: svg.replace(/VAR_SIZE/g, size) }}
        />
      );
    };

    const safeStr = (v) => (v === null || v === undefined) ? "" : String(v).trim();
    const safeNum = (v) => { const n = Number(v); return isFinite(n) ? n : 0; };
    const formatVND = (v) => new Intl.NumberFormat('vi-VN', { style:'currency', currency:'VND' }).format(safeNum(v));
    const fmtNum = (n) => {
      const num = safeNum(n);
      return num >= 1000000 ? (num/1000000).toFixed(1)+'M' : num >= 1000 ? (num/1000).toFixed(0)+'k' : String(num);
    };

    const CountUp = ({ end, duration = 1200, formatter }) => {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const [isVisible, setIsVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(([e]) => { if (e.isIntersecting) setIsVisible(true); }, { threshold: 0.1 });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      useEffect(() => {
        if (!isVisible) return;
        let t0 = null;
        const step = (ts) => {
          if (!t0) t0 = ts;
          const p = Math.min((ts - t0) / duration, 1);
          setCount(Math.floor((1 - Math.pow(1-p, 4)) * end));
          if (p < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [end, duration, isVisible]);
      return <span ref={ref}>{formatter ? formatter(count) : count}</span>;
    };

    const GDLFallbackLogo = ({ isDark }) => (
      <div className="flex items-center gap-2 select-none group cursor-pointer">
        <div className="relative h-9 w-9 overflow-hidden rounded-xl bg-brand-bold shadow-lg flex items-center justify-center transition-transform group-hover:scale-110 text-white font-black text-xl italic">G</div>
        <div className="flex flex-col leading-none text-left font-black">
          <span className={`text-lg tracking-tighter ${isDark ? 'text-white' : 'text-slate-900'}`}>GDL <span className="text-brand-bold">Booking</span></span>
          <span className={`text-[7px] font-bold uppercase tracking-[0.2em] ${isDark ? 'text-slate-500' : 'text-slate-400'}`}>Joint Stock Company</span>
        </div>
      </div>
    );

    function App() {
      const [theme, setTheme] = useState('dark');
      const [view, setView] = useState('home'); 
      const [influencers, setInfluencers] = useState([]);
      const [cart, setCart] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchTerm, setSearchTerm] = useState('');
      const [isFilterModalOpen, setIsFilterModalOpen] = useState(false);
      const [isCategoryOpen, setIsCategoryOpen] = useState(false); 
      const [filters, setFilters] = useState({ category: '', platform: '', maxPrice: 50000000, minFollowers: 0 });
      const [toast, setToast] = useState(null);
      const [logoError, setLogoError] = useState(false);
      const [isExporting, setIsExporting] = useState(false);

      const categoryRef = useRef(null);
      const printAreaRef = useRef();

      const dynamicCategories = useMemo(() => [...new Set(influencers.map(i => safeStr(i.category)).filter(Boolean))], [influencers]);

      useEffect(() => {
        if (typeof google !== 'undefined' && google.script) {
          google.script.run.withSuccessHandler((res) => {
            setInfluencers(JSON.parse(res));
            setLoading(false);
          }).getInfluencers();
        } else { 
          const sheetId = '1_q6tV2YDfxVWs8AJQnfpJ-RCXpuIrKULYDPE1BUwJNg';
          const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

          fetch(url)
            .then(res => res.text())
            .then(text => {
              const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);/);
              if (match && match[1]) {
                const json = JSON.parse(match[1]);
                const headers = json.table.cols.map(c => (c.label || '').toString().toLowerCase().trim());
                
                const result = [];
                json.table.rows.forEach((row, rowIndex) => {
                  let obj = {};
                  let hasData = false;
                  row.c.forEach((cell, index) => {
                    if (headers[index]) {
                      let value = cell ? cell.v : '';
                      if (['followers', 'price_post', 'price_video', 'id'].includes(headers[index])) {
                         value = Number(value) || 0;
                      }
                      if (headers[index] === 'link' || headers[index] === 'image') {
                         value = value ? value.toString() : "#";
                      }
                      obj[headers[index]] = value;
                      if (value) hasData = true;
                    }
                  });
                  if (!obj.id) obj.id = rowIndex + 1;
                  if (hasData && obj.name) result.push(obj);
                });
                setInfluencers(result);
              } else {
                setInfluencers(MOCK_INFLUENCERS);
              }
            })
            .catch(err => {
              console.error("Lỗi fetch sheet: ", err);
              setInfluencers(MOCK_INFLUENCERS);
            })
            .finally(() => {
              setLoading(false);
            });
        }
      }, []);

      const toggleTheme = () => {
        const nextTheme = theme === 'dark' ? 'light' : 'dark';
        setTheme(nextTheme);
        document.documentElement.setAttribute('data-theme', nextTheme);
        if (nextTheme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        setLogoError(false);
      };

      const updateCartItem = (id, fields) => {
        setCart(prev => prev.map(item => {
          if (item.id === id) {
            const updated = { ...item, ...fields };
            if (fields.format) updated.selectedPrice = fields.format === 'Air video' ? item.price_video : item.price_post;
            return updated;
          }
          return item;
        }));
      };

      const trialAddedRef = useRef(false);

      useEffect(() => {
        const trialEligibleSuppliers = ['GDL', 'YAN', 'DAN', 'RAD'];
        const eligibleItems = cart.filter(item => trialEligibleSuppliers.includes(safeStr(item.supplier).toUpperCase()) && item.id !== 'gbuzz_free');
        const eligibleCount = eligibleItems.reduce((acc, curr) => acc + safeNum(curr.quantity || 1), 0);
        
        const hasTrial = cart.some(item => item.id === 'gbuzz_free');
        
        if (eligibleCount >= 2 && !hasTrial && !trialAddedRef.current) {
          trialAddedRef.current = true;
          setCart(prev => {
            if (prev.some(i => i.id === 'gbuzz_free')) return prev;
            return [...prev, { id: 'gbuzz_free', name: "GBUZZ TRIAL", supplier: "GDL", selectedPrice: 0, quantity: 1, format: "FREE", desc: "Tặng 3000 Tương tác + 50 comment cho mỗi post", isGbuzz: true }];
          });
          showNotify("✨ Chúc mừng! Bạn nhận được GBUZZ TRIAL");
        } else if (eligibleCount < 2 && hasTrial) {
          trialAddedRef.current = false;
          setCart(prev => prev.filter(item => item.id !== 'gbuzz_free'));
        }
      }, [cart]);

      const showNotify = useCallback((message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      }, []);

      const handleExportPDF = async () => {
        if (cart.length === 0) return;
        setIsExporting(true);
        try {
          await new Promise(r => setTimeout(r, 600));
          const element = printAreaRef.current;
          element.style.display = 'block';
          const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
          const imgData = canvas.toDataURL('image/png');
          const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
          pdf.addImage(imgData, 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
          pdf.save(`GDL_BaoGia_${new Date().getTime()}.pdf`);
          element.style.display = 'none';
          showNotify("Đã tải báo giá!");
        } catch (error) { showNotify("Lỗi PDF", "error"); } finally { setIsExporting(false); }
      };

      const addToCart = (item) => {
        setCart(prev => {
          if (prev.find(i => String(i.id) === String(item.id))) return prev;
          showNotify(`Đã thêm ${item.name}`);
          const price = item.price !== undefined ? item.price : (item.price_post || 0);
          return [...prev, { ...item, quantity: 1, selectedPrice: price, format: item.isGbuzz ? 'Package' : 'Air post' }];
        });
      };

      const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));

      const copyToClipboard = (text) => {
        const dummy = document.createElement("input");
        document.body.appendChild(dummy); dummy.value = text; dummy.select();
        document.execCommand("copy"); document.body.removeChild(dummy);
        showNotify("Đã sao chép link!");
      };

      const filteredData = useMemo(() => {
        const term = safeStr(searchTerm).toLowerCase();
        return influencers.filter(inf => {
          try {
            const matchSearch = safeStr(inf.name).toLowerCase().includes(term);
            const matchCat = filters.category ? safeStr(inf.category) === filters.category : true;
            const matchPlat = filters.platform ? safeStr(inf.platform) === filters.platform : true;
            const matchPrice = safeNum(inf.price_post) <= filters.maxPrice;
            const matchFollowers = filters.minFollowers === 10000000 ? safeNum(inf.followers) >= 10000000 : safeNum(inf.followers) >= filters.minFollowers;
            return matchSearch && matchCat && matchPlat && matchPrice && matchFollowers;
          } catch(e) { return false; }
        });
      }, [influencers, searchTerm, filters]);

      const systemStats = useMemo(() => {
        const totalKols = filteredData.length;
        const totalFollowers = filteredData.reduce((sum, i) => sum + safeNum(i.followers), 0);
        const totalCats = [...new Set(filteredData.map(i => safeStr(i.category)).filter(Boolean))].length;
        return { totalKols, totalFollowers, totalCats };
      }, [filteredData]);

      // --- LOGIC CHIẾT KHẤU "MUA NHIỀU GIẢM ĐẬM" HOÀN CHỈNH ---
      const promoEligibleSuppliers = ['GDL', 'YAN', 'DAN', 'RAD'];
      const promoEligiblePlatforms = ['FACEBOOK GROUP', 'FACEBOOK PAGE'];
      
      let promoTotalQuantity = 0;
      let totalDiscountAmount = 0;
      let totalRaw = 0;
      let promoSubtotal = 0;

      cart.forEach(item => {
        const itemTotal = safeNum(item.selectedPrice) * safeNum(item.quantity || 1);
        totalRaw += itemTotal;

        if (item.id === 'gbuzz_free') return;
        const sup = safeStr(item.supplier).toUpperCase();
        const plat = safeStr(item.platform).toUpperCase();
        
        if (promoEligibleSuppliers.includes(sup) && promoEligiblePlatforms.includes(plat)) {
          promoTotalQuantity += safeNum(item.quantity || 1);
          promoSubtotal += itemTotal; 
        }
      });

      let baseDiscountRate = 0;
      if (promoTotalQuantity >= 21) baseDiscountRate = 0.25;
      else if (promoTotalQuantity >= 11) baseDiscountRate = 0.20;
      else if (promoTotalQuantity >= 6) baseDiscountRate = 0.15;
      else if (promoTotalQuantity >= 2) baseDiscountRate = 0.10;

      cart.forEach(item => {
        if (item.id === 'gbuzz_free') return;
        const sup = safeStr(item.supplier).toUpperCase();

                              <div className="flex-1 text-center sm:text-left cursor-pointer group w-full font-black" onClick={() => setView('gbuzz')}><span className="bg-brand-bold text-white text-[9px] px-3 py-1 rounded-full uppercase mb-2 inline-block shadow-lg font-black">Quà tặng đặc biệt 🎁</span><h4 className="font-black text-xl sm:text-2xl text-brand-bold leading-tight italic uppercase group-hover:underline text-left font-black">GBUZZ TRIAL</h4><p className="text-slate-500 font-bold mt-1 sm:mt-2 text-xs sm:text-sm italic font-normal">{item.desc}</p><p className="text-[8px] font-black text-brand-bold uppercase tracking-widest mt-3 flex items-center justify-center sm:justify-start gap-1 opacity-60 group-hover:opacity-100 transition-opacity font-black"><Icon name="external-link" size={10} /> Nhấn để xem chi tiết</p></div>
                          ) : (
                            <><div className="flex items-center gap-4 shrink-0 font-black">{item.isGbuzz ? <div className="h-14 w-14 sm:h-16 sm:w-16 flex items-center justify-center bg-brand-bold rounded-2xl text-white shrink-0 shadow-lg italic text-lg sm:text-xl cursor-pointer font-black" onClick={() => setView('gbuzz')}>GB</div> : <img src={item.image} className="w-16 h-16 sm:w-20 sm:h-20 rounded-xl sm:rounded-2xl object-cover shadow-lg shrink-0" loading="lazy" />}</div><div className="flex-1 text-center sm:text-left cursor-pointer w-full font-black" onClick={() => item.isGbuzz && setView('gbuzz')}><h4 className={`font-black text-base sm:text-xl leading-tight ${theme === 'dark' ? 'text-white' : 'text-slate-900'} ${item.isGbuzz ? 'hover:underline font-black' : ''}`}>{item.name}</h4><div className="flex flex-wrap justify-center sm:justify-start gap-2 mt-2 font-black"><span className="px-2 py-0.5 rounded bg-slate-800 text-slate-400 text-[9px] font-bold uppercase">{item.platform || 'System'}</span></div></div><div className="flex items-center gap-4 sm:gap-6 w-full sm:w-auto justify-between sm:justify-end border-t border-slate-800/30 sm:border-none pt-4 sm:pt-0 mt-2 sm:mt-0 font-black">{!item.isGbuzz && (<div className="flex flex-col gap-1 text-left font-black"><label className="text-[8px] sm:text-[9px] font-black text-slate-500 uppercase tracking-tighter">Số lượng</label><input type="number" min="1" className={`w-14 sm:w-16 p-1.5 sm:p-2 rounded-lg sm:rounded-xl text-center font-bold border-none outline-none ${theme === 'dark' ? 'bg-slate-950 text-white border border-white/5' : 'bg-slate-100 text-slate-950 shadow-inner font-black'}`} value={item.quantity} onChange={(e) => updateCartItem(item.id, { quantity: parseInt(e.target.value) || 1 })} /></div>)}<div className="text-right min-w-[100px] sm:min-w-[140px] font-black"><span className="text-lg sm:text-2xl text-brand-bold tracking-tighter font-black">{formatVND(item.selectedPrice * item.quantity)}</span>{item.id !== 'gbuzz_free' && <button onClick={() => removeFromCart(item.id)} className="block ml-auto mt-1 sm:mt-2 text-rose-500 hover:text-rose-400 transition-colors font-black"><Icon name="trash-2" size={18} /></button>}</div></div></>
                          )}
                        </div>
                      ))}
                    </div>
                    <div className={`p-6 sm:p-8 rounded-[2.5rem] sm:rounded-[3.5rem] shadow-2xl h-fit card-frame ${theme === 'dark' ? 'bg-slate-900' : 'bg-white'}`}>
                      <h3 className="text-xl sm:text-2xl mb-6 sm:mb-8 italic text-brand-bold flex items-center gap-3 uppercase tracking-tighter text-left font-black"><Icon name="file-text" size={20}/> Báo giá sơ bộ</h3>
                      <div className="space-y-4 sm:space-y-6 text-xs sm:text-sm font-bold text-slate-500 text-left font-black">
                        <div className="flex justify-between font-medium text-left font-black"><span>Giá trị gốc</span><span className={theme === 'dark' ? 'text-white' : 'text-slate-950'}>{formatVND(totalRaw)}</span></div>
                        <div className="flex justify-between items-center text-brand-bold text-left text-emerald-600 font-black">
                          <div className="flex flex-col text-left font-black">
                             <span className="italic font-black">Chiết khấu ({displayDiscountPct}%)</span>
                             <span className="text-[8px] sm:text-[9px] font-normal text-slate-400 italic text-left">Áp dụng: {promoTotalQuantity} bài hợp lệ</span>
                          </div>
                          <span className="text-lg sm:text-xl font-black text-right font-black">-{formatVND(totalDiscountAmount)}</span>
                        </div>
                        <div className="flex justify-between font-medium text-left font-black"><span>VAT (8%)</span><span className={theme === 'dark' ? 'text-white' : 'text-slate-950'}>{formatVND(taxAmount)}</span></div>
                        <div className={`pt-4 sm:pt-6 border-t-2 ${theme === 'dark' ? 'border-slate-800' : 'border-slate-100'} font-black`}><div className="flex flex-col items-end gap-1 sm:gap-2 text-right font-black"><span className="text-[9px] sm:text-[10px] uppercase font-black text-slate-400 tracking-[0.2em]">Tổng cộng thanh toán</span><span className={`font-black text-brand-bold tracking-tighter leading-none whitespace-nowrap overflow-hidden transition-all font-black font-black ${getDynamicFontSize(formatVND(finalTotal))}`}>{formatVND(finalTotal)}</span></div></div>
                      </div>
                      <button onClick={handleExportPDF} disabled={isExporting} className="w-full mt-8 sm:mt-10 py-4 sm:py-5 rounded-xl sm:rounded-2xl bg-brand-bold font-black text-white text-sm sm:text-base shadow-xl hover:opacity-90 transition-all uppercase tracking-widest italic flex items-center justify-center gap-2 font-black disabled:opacity-60 disabled:cursor-not-allowed"><Icon name="download" size={18}/> {isExporting ? 'Đang xuất...' : 'Xuất Báo Giá PDF'}</button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* MOBILE BOTTOM NAVIGATION BAR */}
          <div className="md:hidden fixed bottom-0 left-0 w-full z-[80] bg-slate-950/90 backdrop-blur-xl border-t border-slate-800 flex justify-around items-center py-3 px-2 pb-safe">
              <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1 p-2 ${view === 'home' ? 'text-brand-bold' : 'text-slate-500'}`}>
                 <Icon name="search" size={20}/>
                 <span className="text-[8px] font-black uppercase tracking-widest">KOLs</span>
              </button>
              <button onClick={() => setView('promotions')} className={`flex flex-col items-center gap-1 p-2 ${view === 'promotions' ? 'text-brand-bold' : 'text-slate-500'}`}>
                 <div className="relative">
                   <Icon name="zap" size={20}/>
                   <span className="absolute -top-1 -right-1 flex h-2 w-2 items-center justify-center rounded-full bg-yellow-500 animate-ping"></span>
                 </div>
                 <span className="text-[8px] font-black uppercase tracking-widest">Sale</span>
              </button>
              <button onClick={() => setView('gbuzz')} className={`flex flex-col items-center gap-1 p-2 ${view === 'gbuzz' ? 'text-brand-bold' : 'text-slate-500'}`}>
                 <Icon name="layers" size={20}/>
                 <span className="text-[8px] font-black uppercase tracking-widest">GBuzz</span>
              </button>
              <button onClick={() => setView('cart')} className={`flex flex-col items-center gap-1 p-2 ${view === 'cart' ? 'text-brand-bold' : 'text-slate-500'}`}>
                 <div className="relative">
                   <Icon name="shopping-cart" size={20}/>
                   {cart.length > 0 && <span className="absolute -top-2 -right-2 flex h-4 w-4 items-center justify-center rounded-full bg-rose-500 text-[8px] font-black text-white">{cart.length}</span>}
                 </div>
                 <span className="text-[8px] font-black uppercase tracking-widest">Giỏ</span>
              </button>
          </div>

          {isCategoryOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-10 bg-slate-950/80 backdrop-blur-xl animate-in fade-in duration-300">
              <div className={`w-full max-w-4xl max-h-[80vh] overflow-hidden flex flex-col rounded-[2rem] sm:rounded-[3rem] border shadow-2xl animate-in zoom-in-95 duration-300 ${theme === 'dark' ? 'bg-slate-900/90 border-white/20' : 'bg-white/90 border-slate-200 shadow-emerald-950/10'}`} ref={categoryRef}><div className="p-6 sm:p-10 border-b border-white/10 flex items-center justify-between font-black"><div className="flex items-center gap-3 sm:gap-4 text-brand-bold italic uppercase font-black text-xl sm:text-3xl tracking-tighter text-left font-black font-black"><Icon name="layers" size={24} /><h3>Chọn Ngành Nghề</h3></div><button onClick={() => setIsCategoryOpen(false)} className={`p-2 sm:p-3 rounded-full transition-colors ${theme === 'dark' ? 'hover:bg-slate-800 text-white' : 'hover:bg-slate-100 text-slate-900'}`}><Icon name="x" size={24} /></button></div><div className="flex-1 overflow-y-auto p-4 sm:p-10 scrollbar-hide text-left text-left font-black font-black"><div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 text-left font-black font-black"><button className={`group p-4 sm:p-6 rounded-xl sm:rounded-2xl text-left transition-all border-2 ${!filters.category ? 'bg-brand-bold border-brand-bold shadow-lg shadow-brand-bold/30 text-white font-black font-black' : 'bg-white/5 border-transparent hover:border-brand-bold/50 font-black font-black'} font-black`} onClick={() => { setFilters({...filters, category: ''}); setIsCategoryOpen(false); }}><span className="text-[9px] sm:text-xs uppercase tracking-widest mb-1 block opacity-60 font-black">Hệ thống</span><span className={`text-sm sm:text-xl uppercase italic font-black font-black`}>TẤT CẢ NGÀNH</span></button>{dynamicCategories.map(cat => (<button key={cat} className={`group p-4 sm:p-6 rounded-xl sm:rounded-2xl text-left transition-all border-2 ${filters.category === cat ? 'bg-brand-bold border-brand-bold shadow-lg shadow-brand-bold/30 text-white font-black font-black' : 'bg-white/5 border-transparent hover:border-brand-bold/50 font-black font-black'} font-black font-black`} onClick={() => { setFilters({...filters, category: cat}); setIsCategoryOpen(false); }}><span className="text-[9px] sm:text-xs uppercase tracking-widest mb-1 block opacity-60 font-black font-black">Danh mục</span><span className={`text-sm sm:text-xl uppercase italic font-black font-black`}>{cat}</span></button>))}</div></div></div>
            </div>
          )}

          {isFilterModalOpen && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl animate-in fade-in duration-300 font-black"><div className={`w-full max-w-xl rounded-[2.5rem] sm:rounded-[3.5rem] border p-6 sm:p-10 shadow-2xl card-frame ${theme === 'dark' ? 'bg-slate-900 border-white/10 text-white' : 'bg-white border-slate-100 text-slate-900 shadow-slate-200'} font-black`}><div className="flex items-center justify-between mb-8 sm:mb-10 italic uppercase font-black text-[#02bf02] text-4xl sm:text-5xl tracking-tighter text-shadow-strong text-stroke-brand text-left font-black font-black font-black font-black font-black"><h3 className="text-left dark:text-white font-black font-black font-black font-black font-black">Bộ Lọc Nâng Cao</h3><button onClick={() => setIsFilterModalOpen(false)} className={`p-2 sm:p-3 rounded-full transition-colors ${theme === 'dark' ? 'hover:bg-slate-800 text-white' : 'hover:bg-slate-100 text-slate-900'} font-black font-black font-black`}><Icon name="x" size={24} /></button></div><div className="space-y-6 sm:space-y-8 text-left font-black font-black font-black font-black"><div className="space-y-2 text-left text-left font-black font-black font-black font-black"><label className="text-[10px] sm:text-[11px] font-bold uppercase text-slate-500 px-1 text-left block tracking-widest font-black font-black font-black font-black">Nền tảng</label><select className={`w-full p-3 sm:p-4 rounded-xl sm:rounded-2xl border-none font-bold outline-none text-xs sm:text-sm ${theme === 'dark' ? 'bg-slate-950 text-white border border-white/5' : 'bg-white border border-slate-200 shadow-inner text-slate-900'} font-black font-black font-black`} value={filters.platform} onChange={e => setFilters({...filters, platform: e.target.value})}><option value="">Tất cả</option>{[...new Set(influencers.map(i => safeStr(i.platform)).filter(Boolean))].map(p => <option key={p} value={p}>{p}</option>)}</select></div><div className="space-y-3 sm:space-y-4 px-1 font-black font-black font-black font-black font-black font-black"><div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-1 text-left font-black font-black font-black font-black font-black font-black font-black font-black"><label className="text-[9px] sm:text-[10px] uppercase text-slate-500 tracking-widest block font-black font-black">Ngân sách tối đa</label><span className="text-sm sm:text-base text-brand-bold underline italic text-left sm:text-right font-black font-black font-black font-black font-black">{filters.maxPrice === 50000000 ? "Trên 50.000.000đ" : formatVND(filters.maxPrice)}</span></div><input type="range" min="1000000" max="50000000" step="1000000" className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-bold" value={filters.maxPrice} onChange={(e) => setFilters({...filters, maxPrice: parseInt(e.target.value)})} /></div><div className="space-y-3 sm:space-y-4 px-1 font-black font-black font-black font-black font-black font-black font-black"><div className="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center mb-1 text-left font-black font-black font-black font-black font-black font-black font-black font-black font-black font-black"><label className="text-[9px] sm:text-[10px] uppercase text-slate-500 tracking-widest block font-black font-black font-black">Followers tối thiểu</label><span className="text-sm sm:text-base text-brand-bold underline italic text-left sm:text-right font-black font-black font-black font-black font-black">{filters.minFollowers === 10000000 ? "Trên 10M+" : fmtNum(filters.minFollowers)}</span></div><input type="range" min="0" max="10000000" step="500000" className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-brand-bold" value={filters.minFollowers} onChange={(e) => setFilters({...filters, minFollowers: parseInt(e.target.value)})} /></div></div><button onClick={() => setIsFilterModalOpen(false)} className="w-full py-4 sm:py-5 rounded-xl sm:rounded-2xl bg-brand-bold font-black text-white mt-8 sm:mt-12 shadow-xl hover:opacity-90 transition-all uppercase tracking-widest text-xs sm:text-sm italic text-center block flex justify-center items-center h-14 font-black font-black font-black font-black">Xác nhận lọc</button></div></div>
          )}

          {toast && (
            <div className={`fixed bottom-20 md:bottom-10 left-1/2 -translate-x-1/2 z-[200] flex items-center gap-3 sm:gap-4 px-6 sm:px-8 py-4 sm:py-5 rounded-2xl sm:rounded-3xl shadow-2xl border backdrop-blur-xl animate-in slide-in-from-bottom-10 duration-500 ${theme === 'dark' ? 'bg-slate-900 border-white/20 text-white shadow-black/50' : 'bg-white border-brand-bold/20 text-slate-900 shadow-slate-200'} w-[90%] sm:w-auto font-black font-black`}><div className={toast.type === 'error' ? 'text-rose-500' : 'text-brand-bold'}><Icon name={toast.type === 'error' ? 'info' : 'check-circle'} size={24}/></div><span className="font-black tracking-tight text-xs sm:text-sm uppercase italic text-left font-black font-black font-black font-black font-black">{toast.message}</span></div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
